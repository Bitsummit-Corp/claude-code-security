name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.10.0
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not set; skipping publish."
            exit 0
          fi
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          for pkg in core hooks settings cli rules plugin meta; do
            (cd packages/$pkg && pnpm publish --access public --no-git-checks --provenance) || echo "publish of $pkg failed (may be acceptable if version unchanged)"
          done
      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@2 --output-file sbom.cyclonedx.json --output-format JSON
          ls -lh sbom.cyclonedx.json
      - name: Attach SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cyclonedx.json
          prerelease: ${{ contains(github.ref, '-rc.') || contains(github.ref, '-beta.') || contains(github.ref, '-alpha.') }}

  sea-build:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,       target: macos-arm64,   ext: '' }
          - { runner: macos-13,       target: macos-x64,     ext: '' }
          - { runner: ubuntu-latest,  target: linux-x64,     ext: '' }
          - { runner: windows-latest, target: windows-x64,   ext: '.exe' }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.10.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build SEA binary
        shell: bash
        run: ./scripts/build-sea.sh "${{ matrix.target }}"
      - name: Upload SEA binary
        uses: actions/upload-artifact@v4
        with:
          name: ccsec-${{ matrix.target }}
          path: dist/binaries/ccsec-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error
